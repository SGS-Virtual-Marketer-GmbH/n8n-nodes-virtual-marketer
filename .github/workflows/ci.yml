name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # --ignore-scripts skips the native build of isolated-vm (a transitive
      # dev dependency of n8n-workflow); only its type definitions are needed.
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
