name: Publish to npm (with provenance)

# Publishes a provenance-signed package to npm using npm "trusted publishing"
# (OIDC) — no NPM_TOKEN secret required. Provenance is required for n8n
# verified / official community node submission, and requires a PUBLIC repo.
#
# One-time setup on npmjs.com (Account/Package -> Settings -> Trusted Publisher):
#   Provider:        GitHub Actions
#   Organization:    SGS-Virtual-Marketer-GmbH
#   Repository:      n8n-nodes-virtual-marketer
#   Workflow filename: publish.yml
#
# Then publish by either creating a GitHub Release or running this workflow
# manually (Actions tab -> Run workflow). Bump the version in package.json
# first — npm rejects re-publishing an existing version.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance + trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Trusted publishing / OIDC support needs a recent npm. Note: we deliberately
      # do NOT set registry-url here — that writes an .npmrc with a placeholder
      # _authToken which makes npm use (empty) token auth instead of the OIDC
      # trusted-publishing exchange. With no token present, npm uses OIDC.
      - run: npm install -g npm@latest
      - name: Diagnostics (npm version + OIDC env)
        run: |
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)  ($(which npm))"
          echo "OIDC url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
          echo "OIDC token present: ${ACTIONS_ID_TOKEN_REQUEST_TOKEN:+yes}"
      # --ignore-scripts skips the native build of isolated-vm (a transitive
      # dev dependency of n8n-workflow); only its type definitions are needed.
      - run: npm ci --ignore-scripts
      - run: npm run lint
      - run: npm run build
      - run: npm publish --provenance --access public
